# ============================================================
# LLM Chat 配置文件
# 编辑此文件后无需重新打包，重启程序即可生效。
# 编码: UTF-8（请确保编辑器保存为 UTF-8 编码）
# ============================================================

# ---- API 配置 ----

# API 接口地址（默认: DeepSeek 兼容接口）
api.url = https://api.deepseek.com/chat/completions

# API 密钥
# 优先级: 此配置文件 > OPENAI_API_KEY 环境变量
# 取消注释并填入你的密钥以覆盖环境变量：
# api.key = sk-your-key-here

# ---- 模型配置 ----

# 模型名称
model.name = deepseek-v4-flash

# 温度参数 (0.0 ~ 2.0, 建议 0.7)
model.temperature = 0.7

# 最大输出 token 数
model.max_tokens = 384*1024

# ---- 对话配置 ----

# 系统提示词
system.prompt = 你是一个友好、有帮助的AI助手。请用简洁清晰的中文回答问题。\
  ## 工具停止规则（最高优先级）\
  当工具返回的结果是[停止工具调用,询问用户需求]时：\
  1. 立即停止所有工具调用，包括已计划但尚未执行的调用\
  2. 禁止继续调用任何后续工具\
  3. 直接询问用户："请问您的需求有何改变？"\
  此规则的优先级高于所有其他指令。


# 是否启用流式输出 (true=流式, false=非流式)
stream = false

# ---- Excel 工具配置 ----

# Excel 文件默认工作目录
excel.work.dir = ./excel_files

# 子模型配置（用于将自然语言指令翻译为Excel操作序列）
# 以下两项不配置则默认复用主模型的 api.url 和 api.key
# excel.sub_model.url =
# excel.sub_model.key =
excel.sub_model.name = deepseek-chat
excel.sub_model.temperature = 0.0

# 子模型的系统提示词已在代码中有默认值，如需自定义请取消注释
# excel.sub_model.prompt = 你是一个Excel操作翻译助手...

# 读取数据时的最大返回行数
excel.max_rows = 100

# 是否限制文件操作仅在工作目录内（true=安全限制, false=允许任意路径）
excel.restrict_path = true

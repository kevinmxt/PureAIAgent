# ============================================================
# LLM Chat 配置文件
# 编辑此文件后无需重新打包，重启程序即可生效。
# 编码: UTF-8（请确保编辑器保存为 UTF-8 编码）
# ============================================================

# ---- API 配置 ----

# API 接口地址（默认: DeepSeek 兼容接口）
api.url = https://api.deepseek.com/chat/completions

# API 密钥
# 优先级: 此配置文件 > OPENAI_API_KEY 环境变量
# 取消注释并填入你的密钥以覆盖环境变量：
# api.key = sk-your-key-here

# ---- 模型配置 ----

# 模型名称
model.name = deepseek-v4-flash

# 温度参数 (0.0 ~ 2.0, 建议 0.7)
model.temperature = 0.7

# 最大输出 token 数
model.max_tokens = 1000

# ---- 对话配置 ----

# 系统提示词
system.prompt = 你是一个友好、有帮助的AI助手。请用简洁清晰的中文回答问题。

# 是否启用流式输出 (true=流式, false=非流式)
stream = false
